<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>An Incremental Game</title>
    <link rel="stylesheet" href="style.css"></link>
</head>
<body>
    <h1 id="points-text">points: 0.00</h1>
    <p id="pps-text">per second: 0.00</p>
    <br>
    <button onclick="gainPoint()" id="pointsButton">+1.00 points</button>
    <br>
    <button onclick="upgrade1Buy()" id="upgrade1Button">[B1] +1 base points per click - cost: 20.00</button>
    <br>
    <button onclick="upgrade2Buy()" id="upgrade2Button">[B2] +50% of your click in points every second - cost: 500.00</button>
    <br>
    <button onclick="upgrade3Buy()" id="upgrade3Button">[B3] double total point gain - cost: 1.000 million</button>
    <hr>
    <button onclick="multUnlockBuy()" id="multUnlockButton" style="color: blue">[MU] one time - start increasing the Multiplier by +0.001× per second - cost: 400,000.00</button>
    <h1 id="multiplier-text" style="color: aquamarine">multiplier: 1.000×</h1>
    <p id="mps-text" style="color: lightskyblue">per second: +0.001×</p>
    <br>
    <button onclick="multUpgrade1Buy()" id="multUpgrade1Button" style="color: blue">[M1] +0.001× per second - cost: 100,000.00</button>
    <br>
    <button onclick="multUpgrade2Buy()" id="multUpgrade2Button" style="color: blue">[M2] one time - boost multiplier gain based on log10 of points - cost: 25.000 million</button>
    <hr>
    <div id="prestige-base">
    <h1 id="electrons-text" style="color: magenta">electrons: 0.00</h1>
    <p id="electrons-boost-text" style="color: magenta">currently boosting points by 1.000×</p>
    <button onclick="resetGame()" id="resetButton" style="background-color: magenta; color: black">reset all progress so far to gain 0.00 electrons</button>
    <hr>
    </div>
    <div id="prestige-upgrades">
    <button onclick="electronUpgrade1Buy()" id="electronUpgrade1Button" style="background-color: magenta; color: black">[E1] one time - triple multiplier gain - cost: 5.00 e</button>
    <br>
    <button onclick="electronUpgrade2Buy()" id="electronUpgrade2Button" style="background-color: magenta; color: black">[E2] one time - [M2] is significantly more effective - cost: 15.00 e</button>
    <br>
    <button onclick="electronUpgrade3Buy()" id="electronUpgrade3Button" style="background-color: magenta; color: black">[E3] one time - multiplier remains unlocked upon reset - cost: 25.00 e</button>
    <br>
    <button onclick="electronUpgrade4Buy()" id="electronUpgrade4Button" style="background-color: magenta; color: black">[E4] 1.5× total point gain - cost: 10.00 e</button>
    <br>
    <br>
    <button onclick="electronUpgrade5Buy()" id="electronUpgrade5Button" style="background-color: magenta; color: black">[E5] (0 / 5) improve the prestige formula - cost: 50.00 e</button>
    <br>
    <br>
    <button onclick="electronUpgradeXBuy()" id="electronUpgradeXButton" style="background-color: magenta; color: black">[EX] one time - gain 0.1% of electrons gained on reset every second - cost: 16,000.00 e</button>
    
    </div>
    <script src="script.js"></script>
</body>

</html>
